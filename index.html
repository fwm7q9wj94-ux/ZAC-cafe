<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand:    #5C3D2E;
    --brand-lt: #8B6352;
    --accent:   #C8A882;
    --bg:       #FAF8F5;
    --bg2:      #F2EDE7;
    --card:     #FFFFFF;
    --text:     #2C1D14;
    --text2:    #7A6558;
    --border:   #E8E0D8;
    --radius:   14px;
    --tag-r:    8px;
    font-size: 16px;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100%;
    -webkit-font-smoothing: antialiased;
  }

  /* ── LANG BAR ── */
  .lang-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--brand);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 8px 16px;
    box-shadow: 0 2px 12px rgba(44,29,20,0.18);
  }
  .lang-btn {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.7);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    font-family: inherit;
    letter-spacing: 0.02em;
  }
  .lang-btn.active {
    background: #fff;
    color: var(--brand);
    border-color: #fff;
    font-weight: 700;
  }

  /* ── HERO ── */
  .hero {
    background: var(--brand);
    color: #fff;
    padding: 28px 20px 24px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -30px; left: -20px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .hero-since {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .hero-name {
    font-family: 'DM Serif Display', serif;
    font-size: 38px;
    line-height: 1;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .hero-name-zh {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    color: rgba(255,255,255,0.65);
    font-weight: 400;
    margin-bottom: 18px;
    letter-spacing: 0.06em;
  }
  .hero-divider {
    width: 40px;
    height: 2px;
    background: var(--accent);
    border-radius: 2px;
    margin-bottom: 18px;
  }
  .hero-info { display: flex; flex-direction: column; gap: 7px; }
  .hero-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13px;
    color: rgba(255,255,255,0.8);
    line-height: 1.4;
  }
  .hero-icon {
    width: 16px;
    flex-shrink: 0;
    margin-top: 1px;
    opacity: 0.6;
  }

  /* ── CATEGORY TABS ── */
  .cat-tabs {
    position: sticky;
    top: 44px;
    z-index: 90;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat-tabs-inner {
    display: flex;
    padding: 0 16px;
    gap: 0;
    width: max-content;
    min-width: 100%;
  }
  .cat-tab {
    background: none;
    border: none;
    border-bottom: 2.5px solid transparent;
    padding: 13px 14px 11px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.02em;
  }
  .cat-tab.active {
    color: var(--brand);
    border-bottom-color: var(--brand);
    font-weight: 700;
  }

  /* ── SECTION ── */
  .section { padding: 0 0 4px; }
  .section-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text2);
    padding: 22px 20px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── CARDS ── */
  .cards { display: flex; flex-direction: column; gap: 1px; }
  .card {
    background: var(--card);
    display: flex;
    align-items: center;
    gap: 0;
    cursor: pointer;
    transition: background 0.12s;
    -webkit-tap-highlight-color: transparent;
    border-bottom: 1px solid var(--border);
  }
  .card:active { background: var(--bg2); }
  .card-emoji {
    width: 80px;
    min-width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    background: var(--bg2);
    flex-shrink: 0;
  }
  .card-body {
    flex: 1;
    padding: 14px 14px 14px 16px;
    min-width: 0;
  }
  .card-name {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-note {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 7px;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    flex: 1;
    min-width: 0;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }
  .tag-R  { background: #FFF3CD; color: #856404; }
  .tag-1  { background: #FFE8E8; color: #C0392B; }
  .tag-2  { background: #FFD5D5; color: #C0392B; }
  .tag-3  { background: #FFCDD2; color: #B71C1C; }
  .tag-P  { background: #FFF0F6; color: #AD1457; }
  .tag-B  { background: #FFF8E1; color: #E65100; }
  .tag-L  { background: #F3E5F5; color: #6A1B9A; }
  .tag-V  { background: #E8F5E9; color: #2E7D32; }
  .tag-V5 { background: #F1F8E9; color: #558B2F; }
  .tag-H  { background: #E8F4FD; color: #1565C0; }
  .card-price {
    font-size: 15px;
    font-weight: 700;
    color: var(--brand);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .card-chevron {
    color: var(--border);
    flex-shrink: 0;
    margin-left: 4px;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(44,29,20,0.55);
    z-index: 200;
    opacity: 0;
    transition: opacity 0.22s;
    pointer-events: none;
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
  }
  .modal-overlay.show {
    opacity: 1;
    pointer-events: all;
  }
  .modal {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 100%;
    max-width: 430px;
    background: var(--card);
    border-radius: 24px 24px 0 0;
    z-index: 201;
    transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 88vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .modal.show {
    transform: translateX(-50%) translateY(0);
  }
  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .modal-emoji {
    font-size: 72px;
    text-align: center;
    padding: 20px 0 16px;
    background: var(--bg2);
    margin: 12px 16px 0;
    border-radius: var(--radius);
  }
  .modal-body { padding: 20px 20px 40px; }
  .modal-name {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.25;
    color: var(--text);
    margin-bottom: 8px;
  }
  .modal-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 14px;
  }
  .modal-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 9px;
    border-radius: 6px;
    letter-spacing: 0.02em;
  }
  .modal-price-block {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .modal-price-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 0;
  }
  .modal-price-label {
    font-size: 14px;
    color: var(--text2);
  }
  .modal-price-val {
    font-size: 18px;
    font-weight: 700;
    color: var(--brand);
  }
  .modal-desc {
    font-size: 14px;
    line-height: 1.65;
    color: var(--text2);
  }
  .modal-note-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
    margin: 14px 0 5px;
    opacity: 0.7;
  }
  .modal-close {
    position: absolute;
    top: 18px;
    right: 18px;
    background: var(--bg2);
    border: none;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text2);
    font-size: 18px;
    line-height: 1;
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    padding: 28px 20px 40px;
    font-size: 12px;
    color: var(--text2);
    line-height: 1.7;
    border-top: 1px solid var(--border);
  }

  /* ── LANG FONTS ── */
  [data-lang="ja"] { font-family: 'Noto Sans JP', sans-serif; }
</style>
</head>

// ── STATE ────────────────────────────────────────────────────────────────
let currentLang = 'zh';
let openItem = null;
let scrollPos = 0;

// ── HELPERS ───────────────────────────────────────────────────────────────
function t(obj) { return obj[currentLang] || obj['zh'] || ''; }
function fmtPrice(p) {
  if (p === 'market') return { zh:'時價', en:'Market Price', ja:'時価', de:'Marktpreis', es:'Precio de mercado' }[currentLang];
  return 'NT$' + p;
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderAll() {
  document.documentElement.lang = currentLang === 'zh' ? 'zh-TW' : currentLang === 'ko' ? 'ko' : currentLang === 'es' ? 'es' : currentLang;
  document.body.setAttribute('data-lang', currentLang);

  // Hero text — show complementary name as subtitle
  // In zh mode: show Chinese name; in other modes: show Chinese name for context
  document.getElementById('hero-name-zh').textContent = storeInfo.names.zh;
  document.getElementById('info-address').textContent = t(storeInfo.address);
  document.getElementById('info-hours').textContent = t(storeInfo.hours);
  document.getElementById('info-reservation-label').textContent = t(storeInfo.reservation);
  document.getElementById('footer-addr').textContent = t(storeInfo.address);

  // Lang buttons
  document.querySelectorAll('[data-lang-btn]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.langBtn === currentLang);
  });

  renderTabs();
  renderSections();
}

function renderTabs() {
  const inner = document.getElementById('cat-tabs-inner');
  inner.innerHTML = '';
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab';
    btn.dataset.cat = cat.id;
    btn.textContent = t(cat.label);
    btn.addEventListener('click', () => scrollToSection(cat.id));
    inner.appendChild(btn);
  });
}

function renderSections() {
  const main = document.getElementById('menu-main');
  main.innerHTML = '';
  categories.forEach(cat => {
    const items = menuItems.filter(i => i.category === cat.id);
    if (!items.length) return;

    const sec = document.createElement('section');
    sec.className = 'section';
    sec.id = 'sec-' + cat.id;
    sec.setAttribute('data-cat', cat.id);

    const titleEl = document.createElement('div');
    titleEl.className = 'section-title';
    titleEl.textContent = t(cat.label);
    sec.appendChild(titleEl);

    const cardsEl = document.createElement('div');
    cardsEl.className = 'cards';

    items.forEach(item => {
      cardsEl.appendChild(renderCard(item));
    });

    sec.appendChild(cardsEl);
    main.appendChild(sec);
  });
}

function renderCard(item) {
  const card = document.createElement('div');
  card.className = 'card';
  card.setAttribute('role', 'button');
  card.setAttribute('tabindex', '0');

  // Emoji
  const emojiEl = document.createElement('div');
  emojiEl.className = 'card-emoji';
  emojiEl.textContent = item.emoji;
  card.appendChild(emojiEl);

  // Body
  const body = document.createElement('div');
  body.className = 'card-body';

  const nameEl = document.createElement('div');
  nameEl.className = 'card-name';
  nameEl.textContent = t(item.names);
  body.appendChild(nameEl);

  const noteText = t(item.note);
  if (noteText) {
    const noteEl = document.createElement('div');
    noteEl.className = 'card-note';
    noteEl.textContent = noteText;
    body.appendChild(noteEl);
  }

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const tagsEl = document.createElement('div');
  tagsEl.className = 'card-tags';
  item.tags.forEach(code => {
    if (!tagDefs[code]) return;
    const def = tagDefs[code];
    const t2 = document.createElement('span');
    t2.className = 'tag tag-' + code;
    t2.textContent = def.icon + ' ' + def[currentLang];
    tagsEl.appendChild(t2);
  });
  footer.appendChild(tagsEl);

  const priceEl = document.createElement('div');
  priceEl.className = 'card-price';
  if (item.price.length === 1 && !item.price[0].label) {
    priceEl.textContent = fmtPrice(item.price[0].value);
  } else {
    priceEl.textContent = 'NT$' + Math.min(...item.price.map(p => p.value)) + '+';
  }
  footer.appendChild(priceEl);

  const chev = document.createElement('span');
  chev.className = 'card-chevron';
  chev.innerHTML = '<svg width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  footer.appendChild(chev);

  body.appendChild(footer);
  card.appendChild(body);

  card.addEventListener('click', () => openModal(item));
  card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openModal(item); });
  return card;
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal(item) {
  scrollPos = window.pageYOffset;
  openItem = item;

  document.getElementById('modal-emoji').textContent = item.emoji;
  document.getElementById('modal-name').textContent = t(item.names);

  // Tags
  const tagsEl = document.getElementById('modal-tags');
  tagsEl.innerHTML = '';
  item.tags.forEach(code => {
    if (!tagDefs[code]) return;
    const def = tagDefs[code];
    const el = document.createElement('span');
    el.className = 'modal-tag tag-' + code;
    el.textContent = def.icon + '  ' + def[currentLang];
    tagsEl.appendChild(el);
  });

  // Price
  const priceBlock = document.getElementById('modal-price-block');
  priceBlock.innerHTML = '';
  item.price.forEach(p => {
    const row = document.createElement('div');
    row.className = 'modal-price-row';
    const label = document.createElement('div');
    label.className = 'modal-price-label';
    label.textContent = p.label ? t(p.label) : ({ zh:'價格', en:'Price', ja:'価格', de:'Preis', es:'Precio' }[currentLang]);
    const val = document.createElement('div');
    val.className = 'modal-price-val';
    val.textContent = fmtPrice(p.value);
    row.appendChild(label);
    row.appendChild(val);
    priceBlock.appendChild(row);
  });

  // Note/desc
  const descEl = document.getElementById('modal-desc');
  descEl.innerHTML = '';
  const noteText = t(item.note);
  if (noteText) {
    const lbl = document.createElement('div');
    lbl.className = 'modal-note-label';
    lbl.textContent = { zh:'關於此品項', en:'About', ja:'説明', de:'Über dieses Gericht', es:'Descripción' }[currentLang];
    const txt = document.createElement('div');
    txt.textContent = noteText;
    descEl.appendChild(lbl);
    descEl.appendChild(txt);
  }

  document.getElementById('modal-overlay').classList.add('show');
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow = '';
  openItem = null;
  // restore scroll
  window.scrollTo(0, scrollPos);
}

// ── TABS ACTIVE STATE (scroll spy) ────────────────────────────────────────
function updateActiveCat() {
  const sections = document.querySelectorAll('.section[data-cat]');
  const tabsTop = document.getElementById('cat-tabs').getBoundingClientRect().bottom;
  let active = null;
  sections.forEach(sec => {
    const rect = sec.getBoundingClientRect();
    if (rect.top <= tabsTop + 10) active = sec.dataset.cat;
  });
  document.querySelectorAll('.cat-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.cat === active);
  });
}

function scrollToSection(catId) {
  const sec = document.getElementById('sec-' + catId);
  if (!sec) return;
  const tabsHeight = document.getElementById('cat-tabs').offsetHeight + document.querySelector('.lang-bar').offsetHeight;
  const top = sec.getBoundingClientRect().top + window.pageYOffset - tabsHeight - 6;
  window.scrollTo({ top, behavior: 'smooth' });
}

// ── EVENTS ────────────────────────────────────────────────────────────────
document.querySelectorAll('[data-lang-btn]').forEach(btn => {
  btn.addEventListener('click', () => {
    currentLang = btn.dataset.langBtn;
    renderAll();
    if (openItem) {
      openModal(openItem);
    }
  });
});

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', closeModal);

// Swipe down to close modal
let touchStartY = 0;
document.getElementById('modal').addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('modal').addEventListener('touchmove', e => {
  const dy = e.touches[0].clientY - touchStartY;
  if (dy > 60 && document.getElementById('modal').scrollTop === 0) {
    closeModal();
  }
}, { passive: true });

window.addEventListener('scroll', updateActiveCat, { passive: true });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── INIT ──────────────────────────────────────────────────────────────────
renderAll();
setTimeout(updateActiveCat, 100);
</script>
